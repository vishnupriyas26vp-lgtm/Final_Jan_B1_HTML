<!DOCTYPE html>
<html>
<head>
    <title>Course Registration Form</title>
</head>
<body>
<h2>Course Registration Form</h2>
<form><!--action="url of server"--><!--method="post(giving the data to server) or get(retrieve the data from the server) "-->
    <table border="1" cellpadding="4" cellspacing="0" width="500">
    <fieldset width="100px;">
        <legend>Personal Details</legend>
    </fieldset>

<tr>
    <td>First Name</td>
    <td><input type="text" placeholder="Ex:Harshit"></td>
</tr>
<tr>
    <td>Surname</td>
    <td><input type="text" placeholder="Ex:T"></td>
</tr>
<tr>
    <td>Mobile number</td>
    <td><input type="text" placeholder="Ex:987-897-0987"></td>
</tr>

<tr>
    <td>Email</td>
    <td><input type="email" placeholder="Ex:Harshit@gmail"></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" placeholder="min 8 characters"></td>
</tr>
<tr>
    <td>Confirm Password</td>
    <td><input type="password" placeholder="min 8 characters"></td>
</tr>
<tr>
    <td>DOB</td>
    <td><input type="date"></td>
</tr>
<tr>
    <td>AGE</td>
    <td><input type="number"></td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female
        <input type="radio" name="g"> Others
    </td>
</tr>
<tr>
    <td>Select Country</td>
    <td>
        <select>
            <option>INDIA</option>
            <option>USA</option>
            <option>UK</option>
        </select>
    </td>
</tr>

<tr>
    <td>Upload Picture</td>
    <td><input type="file"></td>
</tr>
<tr>
    <td colspan="2">
        <input type="reset" value="Reset">
    </td>
</tr>
<tr>
    <td colspan="2"><b>Course Details</b></td>
</tr>
<tr>
    <td>Select Course</td>
    <td>
        <select>
            <option>Python Full Stack</option>
            <option>Java Full Stack</option>
        </select>
    </td>
</tr>
<tr>
    <td>Delivery Mode</td>
    <td>
        <input type="radio" name="mode"> ONLINE
        <input type="radio" name="mode"> OFFLINE
    </td>
</tr>
<tr>
    <td>INSTITUTE NAME</td>
    <td><input type="text" value="TAP ACADEMY"></td>
</tr>
<tr>
    <td>Choose your present Coding knowledge level:</td>
    <td><input type="range"></td>
</tr>
<tr>
    <td>Comments</td>
    <td>
        <textarea rows="4" cols="30"></textarea>
    </td>
</tr>
<tr>
    <td colspan="2">
        <input type="submit" value="Submit">
    </td>
</tr>
</table>
</form>
</body>
</html>
